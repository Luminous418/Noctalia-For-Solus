name       : cliphist
version    : 0.7.0
release    : 1
source     :
    - https://github.com/sentriz/cliphist/archive/refs/tags/v0.7.0.tar.gz : 8d7dc7b4495e5812b5613274c250ba5d3900933d78888ce7921c01247f191cc8
homepage   : https://github.com/sentriz/cliphist
license    : GPL-3.0-only
component  : desktop.wayland
summary    : Wayland clipboard manager with support for multimedia
description: |
    cliphist is a clipboard history manager for Wayland. It listens for
    clipboard changes and writes them to a history file using wl-clipboard.
    History can be recalled and piped into any picker (dmenu, rofi, fuzzel,
    wofi, etc.). Both text and images are supported, and clipboard content
    is preserved byte-for-byte, including leading/trailing whitespace and
    newlines.
networking : true
builddeps  :
    - golang
    - wl-clipboard
build      : |
    export GOPATH="$workdir/gopath"
    export GOCACHE="$workdir/gocache"
    go build -v -o cliphist ./...
install    : |
    install -Dm00755 cliphist $installdir/usr/bin/cliphist
